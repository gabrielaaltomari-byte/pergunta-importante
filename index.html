<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Pergunta importante</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    margin-top:100px;
    background:#ffe6f0;
    overflow:hidden;
}

h1{
    font-size:40px;
}

button{
    font-size:22px;
    padding:15px 30px;
    margin:20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

#sim{
    background:#ff4d88;
    color:white;
}

#nao{
    position:absolute;
    background:#999;
    color:white;
}

/* corações */
.heart{
    position:fixed;
    top:-10px;
    font-size:20px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
    }
}
</style>
</head>

<body>

<h1>💖 Quer CONTINUAR namorando comigo? 💖</h1>

<button id="sim" onclick="location.href='sim.html'">SIM</button>
<button id="nao">NÃO</button>

<script>

// BOTÃO FUGINDO
const nao = document.getElementById("nao");

nao.addEventListener("mouseover", () => {

    const largura = window.innerWidth - 100;
    const altura = window.innerHeight - 100;

    const x = Math.random() * largura;
    const y = Math.random() * altura;

    nao.style.left = x + "px";
    nao.style.top = y + "px";

});


// CORAÇÕES CAINDO
function criarCoracao(){

    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);

}

setInterval(criarCoracao,300);

</script>

</body>
</html>
